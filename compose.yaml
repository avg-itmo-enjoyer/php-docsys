version: '3.8'

services:
  php-fpm:
    container_name: php-fpm
    build:
      context: .
      dockerfile: ./docker/fpm/Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
        PHP_VERSION: ${PHP_VERSION:-8.5}
    volumes:
      - .:/var/www/

  nginx:
    container_name: nginx
    build:
      context: ./docker/nginx
    ports:
      - ${NGINX_HOST_HTTP_PORT:-8080}:80
    volumes:
      - .:/var/www:rw
    depends_on:
      - php-fpm
